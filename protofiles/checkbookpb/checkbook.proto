syntax = "proto3";

package protofiles;

import "google/protobuf/timestamp.proto";

option go_package = "projet_grpc/server/protofiles/checkbook";

enum Pages {
    PAGES_UNSPECIFIED = 0;
    TWENTY_FIVE = 1;
    FIFTY = 2;
}

message CheckbookRequest {
    Pages nbPage = 1;
    string accountId = 2;
}

message CheckbookResponse {
    Pages nbPage = 1;
    string accountId = 2;
    google.protobuf.Timestamp creationDate = 3;
    int32 id = 4;
}

message CheckbookList {
  repeated CheckbookResponse checkbooks = 1;
}

message AccountId {
    string accountId = 1;
}

service CheckbookService {
    rpc CreateCheckbook(CheckbookRequest) returns (CheckbookResponse);
    rpc GetCheckbooks(AccountId) returns (CheckbookList);
}